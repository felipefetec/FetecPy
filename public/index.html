<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FetecPy — Login</title>
  <meta name="description" content="Aprenda Python do zero: algoritmos primeiro, sintaxe depois.">

  <!-- Tailwind CSS via CDN (Play CDN — gera estilos sob demanda) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Configuração do tema Tailwind: cores e fonte customizadas -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Verde Python — usado como cor de destaque primária
            python: {
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
            },
          },
          fontFamily: {
            // JetBrains Mono para código; sistema para UI
            mono: ['JetBrains Mono', 'Fira Code', 'Consolas', 'monospace'],
          },
          keyframes: {
            // Animação de entrada suave: surge de baixo com fade
            surgir: {
              '0%':   { opacity: '0', transform: 'translateY(16px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
          animation: {
            surgir: 'surgir 0.4s ease-out forwards',
          },
        },
      },
    }
  </script>

  <!-- JetBrains Mono para o logotipo e elementos de código -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* Sobrescreve o estilo de autofill do browser (fundo azul/amarelo do Chrome/Firefox)
       para manter a aparência consistente com o design dark da plataforma */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 30px #1e293b inset !important;
      -webkit-text-fill-color: #f1f5f9 !important;
      caret-color: #f1f5f9;
    }
  </style>

  <!--
    Módulo principal da página:
    - Importa as funções de auth antes do Alpine carregar
    - Expõe as funções globalmente para o componente Alpine
    - Verifica sessão existente e redireciona se já estiver logado
  -->
  <script type="module">
    import { login, verificarSessao } from './assets/js/auth.js'

    // Expõe para o componente Alpine.js (que não é módulo ES)
    window.__auth = { login, verificarSessao }

    // Redireciona imediatamente se já houver sessão válida,
    // evitando que o aluno logado veja a tela de login
    verificarSessao().then(logado => {
      if (logado) window.location.replace('./app.html')
    })

    // Registra o componente Alpine antes de ele processar o DOM
    document.addEventListener('alpine:init', () => {
      Alpine.data('loginForm', () => ({
        // Campos do formulário
        nome:      '',
        sobrenome: '',
        pin:       '',

        // Estado da UI
        carregando:  false,
        erro:        '',
        novoCadastro: false, // true quando o aluno acessa pela primeira vez

        /**
         * Chamado pelo Alpine quando o componente é inicializado.
         * Remove o atributo hidden da página para evitar flash de conteúdo
         * antes de confirmar que o usuário precisa se autenticar.
         */
        init() {
          // A página começa oculta (opacity-0) para evitar flash
          // e revela após a verificação de sessão completar
          setTimeout(() => this.$el.classList.add('opacity-100'), 50)
        },

        /**
         * Valida os campos do formulário antes de enviar.
         * Retorna false e define this.erro se algum campo for inválido.
         */
        validar() {
          if (!this.nome.trim() || !this.sobrenome.trim() || !this.pin.trim()) {
            this.erro = 'Preencha todos os campos para continuar.'
            return false
          }
          if (!/^\d{4,8}$/.test(this.pin)) {
            this.erro = 'O PIN deve ter apenas dígitos (4 a 8 números).'
            return false
          }
          return true
        },

        /**
         * Submete o formulário de login.
         * Em caso de sucesso, redireciona para o dashboard.
         * Em caso de erro, exibe a mensagem retornada pela API.
         */
        async submeter() {
          this.erro = ''

          if (!this.validar()) return

          this.carregando = true

          try {
            const resultado = await window.__auth.login(
              this.nome.trim(),
              this.sobrenome.trim(),
              this.pin,
            )

            this.novoCadastro = resultado.novo

            // Pequena pausa para que o aluno veja o feedback visual
            // antes de ser redirecionado para o dashboard
            await new Promise(r => setTimeout(r, 500))
            window.location.href = './app.html'

          } catch (e) {
            // Mensagem de erro vinda da API ou fallback genérico
            this.erro = e.erro ?? 'Erro inesperado. Tente novamente.'

            // Limpa o PIN após erro para forçar nova digitação
            this.pin = ''
            this.$nextTick(() => this.$refs.pin?.focus())

          } finally {
            this.carregando = false
          }
        },
      }))
    })
  </script>

  <!-- Alpine.js via CDN — carrega após o módulo acima registrar os dados -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>

<body class="h-full bg-slate-950 text-slate-100">

  <div
    x-data="loginForm"
    class="min-h-full flex flex-col items-center justify-center px-4 py-12 animate-surgir"
  >

    <!-- ============================================================
         Logo e tagline
         ============================================================ -->
    <div class="text-center mb-8 select-none">

      <!-- Ícone de cobra estilizado em SVG — Python sem ser clichê -->
      <div class="flex justify-center mb-4">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="48" height="48" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
          <!-- Corpo da cobra formando o símbolo do Python simplificado -->
          <path d="M24 10 C18 10 14 14 14 20 L14 24 L20 24 L20 20 C20 17 22 16 24 16 C26 16 28 17 28 20 L28 22 C28 22 26 22 24 22 C18 22 14 26 14 32 C14 38 18 38 20 38 L28 38 C34 38 34 34 34 28 L34 24 L28 24 L28 28 C28 31 26 32 24 32 C22 32 20 31 20 28 L20 26 C20 26 22 26 24 26 C30 26 34 22 34 16 C34 10 30 10 24 10 Z" fill="#22c55e"/>
          <!-- Olho esquerdo -->
          <circle cx="19" cy="19" r="2" fill="#0f172a"/>
          <!-- Olho direito -->
          <circle cx="29" cy="29" r="2" fill="#0f172a"/>
        </svg>
      </div>

      <!-- Nome da plataforma em fonte mono para remeter a código -->
      <h1 class="font-mono text-3xl font-bold tracking-tight">
        <span class="text-python-500">Fetec</span><span class="text-slate-100">Py</span>
      </h1>

      <!-- Tagline curta e direta -->
      <p class="mt-2 text-slate-400 text-sm">
        Python para iniciantes — pense antes de codar.
      </p>
    </div>

    <!-- ============================================================
         Card do formulário
         ============================================================ -->
    <div class="w-full max-w-sm">
      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl">

        <!-- Cabeçalho do card -->
        <div class="mb-6">
          <h2 class="text-lg font-semibold text-slate-100">Entrar na plataforma</h2>
          <p class="mt-1 text-sm text-slate-400">
            Primeira vez? Basta preencher e criar sua conta.
          </p>
        </div>

        <!-- Formulário -->
        <form @submit.prevent="submeter" novalidate class="space-y-4">

          <!-- Nome -->
          <div>
            <label for="nome" class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">
              Nome
            </label>
            <input id="nome" type="text" x-model="nome" autocomplete="given-name" autocapitalize="words" placeholder="Felipe" :disabled="carregando" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 placeholder-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-python-500 focus:border-transparent disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-150">
          </div>

          <!-- Sobrenome -->
          <div>
            <label for="sobrenome" class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">
              Sobrenome
            </label>
            <input id="sobrenome" type="text" x-model="sobrenome" autocomplete="family-name" autocapitalize="words" placeholder="Tavares" :disabled="carregando" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 placeholder-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-python-500 focus:border-transparent disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-150">
          </div>

          <!-- PIN -->
          <div>
            <label for="pin" class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">
              PIN
            </label>
            <input id="pin" x-ref="pin" type="password" inputmode="numeric" pattern="[0-9]*" x-model="pin" autocomplete="current-password" placeholder="••••" maxlength="8" :disabled="carregando" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 placeholder-slate-600 text-sm focus:outline-none focus:ring-2 focus:ring-python-500 focus:border-transparent disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-150 font-mono tracking-widest">
          </div>

          <!-- Mensagem de erro -->
          <div
            x-show="erro"
            x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 -translate-y-1"
            x-transition:enter-end="opacity-100 translate-y-0"
            class="flex items-start gap-2 bg-red-950 border border-red-900 rounded-lg px-3 py-2.5"
            role="alert"
          >
            <svg class="w-4 h-4 text-red-400 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
            </svg>
            <span x-text="erro" class="text-red-300 text-sm"></span>
          </div>

          <!-- Botão de submit -->
          <button
            type="submit"
            :disabled="carregando"
            class="w-full bg-python-500 hover:bg-python-400 text-slate-950 font-semibold text-sm
                   rounded-lg px-4 py-2.5 mt-2
                   focus:outline-none focus:ring-2 focus:ring-python-500 focus:ring-offset-2 focus:ring-offset-slate-900
                   disabled:opacity-60 disabled:cursor-not-allowed
                   transition-all duration-150 flex items-center justify-center gap-2"
          >
            <!-- Spinner de carregamento -->
            <svg
              x-show="carregando"
              class="w-4 h-4 animate-spin"
              fill="none"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>

            <span x-text="carregando ? 'Entrando...' : 'Entrar'"></span>
          </button>

        </form>

        <!-- ============================================================
             Aviso sobre o PIN — obrigatório conforme design da plataforma
             (não há recuperação de PIN por design intencional)
             ============================================================ -->
        <div class="mt-6 flex items-start gap-2 text-slate-500">
          <svg class="w-4 h-4 mt-0.5 shrink-0 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
          </svg>
          <p class="text-xs leading-relaxed">
            <strong class="text-slate-400 font-medium">Não há recuperação de PIN.</strong>
            Escolha algo que você memorize e anote em local seguro.
          </p>
        </div>

      </div><!-- /card -->

      <!-- Rodapé discreto -->
      <p class="mt-6 text-center text-xs text-slate-600">
        FetecPy · Licença
        <a
          href="https://creativecommons.org/licenses/by-nc/4.0/"
          target="_blank"
          rel="noopener noreferrer"
          class="hover:text-slate-400 transition-colors"
        >CC BY-NC 4.0</a>
      </p>
    </div><!-- /max-w-sm -->

  </div><!-- /x-data -->

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'))
    }
  </script>
</body>
</html>
