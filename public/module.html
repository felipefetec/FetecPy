<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FetecPy — Módulo</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            python: { 400: '#4ade80', 500: '#22c55e', 600: '#16a34a' },
          },
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Code', 'Consolas', 'monospace'],
          },
          typography: {
            DEFAULT: { css: { color: '#cbd5e1', maxWidth: 'none' } },
          },
        },
      },
    }
  </script>

  <!-- JetBrains Mono para blocos de código -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- canvas-confetti — confetes e serpentinas ao concluir exercício -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <!-- Prism.js para syntax highlighting Python -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>

  <style>
    /* Estilos da área de conteúdo Markdown */
    .conteudo-md { font-size: 1.125rem; line-height: 1.85; }
    .conteudo-md h1 { @apply text-4xl font-bold text-slate-100 mt-10 mb-5; }
    .conteudo-md h2 { @apply text-3xl font-bold text-slate-100 mt-12 mb-4 pb-3 border-b border-slate-800; }
    .conteudo-md h3 { @apply text-2xl font-semibold text-slate-200 mt-8 mb-3; }
    .conteudo-md p  { @apply text-slate-300 mb-6; }
    .conteudo-md ul { @apply list-disc list-inside text-slate-300 mb-6 space-y-2 ml-2; }
    .conteudo-md ol { @apply list-decimal list-inside text-slate-300 mb-6 space-y-2 ml-2; }
    .conteudo-md li { @apply leading-loose; }
    .conteudo-md strong { @apply text-slate-100 font-semibold; }
    .conteudo-md em     { @apply text-slate-300 italic; }
    .conteudo-md a      { @apply text-python-400 hover:text-python-300 underline; }
    .conteudo-md hr     { @apply border-slate-800 my-10; }
    .conteudo-md blockquote { @apply border-l-4 border-slate-600 pl-5 text-slate-400 italic my-6; }

    /* Tabelas */
    .conteudo-md table  { @apply w-full text-base mb-8; }
    .conteudo-md thead  { @apply bg-slate-800; }
    .conteudo-md th     { @apply px-4 py-3 text-left text-slate-300 font-semibold; }
    .conteudo-md td     { @apply px-4 py-3 text-slate-400 border-t border-slate-800; }

    /* Código inline */
    .conteudo-md :not(pre) > code {
      @apply font-mono text-[1rem] bg-slate-800 text-python-400 px-1.5 py-0.5 rounded;
    }

    /* Blocos de código (Prism.js) */
    .conteudo-md pre {
      @apply text-[1rem] my-6 overflow-x-auto;
    }
    .conteudo-md pre code { @apply font-mono; }

    /* Barra de rolagem */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>

  <script type="module">
    import { verificarSessao }                                  from '/assets/js/auth.js'
    import { apiFetch }                                         from '/assets/js/api.js'
    import { renderizar, extrairTOC, adicionarAncorasTitulos }  from '/assets/js/markdown.js'
    import { carregarPyodide, runPython, pyodidePronto }        from '/assets/js/pyodide.js'
    import { validar, validateTextLivre }                        from '/assets/js/validator.js'
    import { processarRespostaGamificacao }                      from '/assets/js/gamification.js'
    // criarEditor é importado dinamicamente dentro de ativarEditoresTente(),
    // para não atrasar o registro do alpine:init com requisições para esm.sh

    // Ordem dos módulos para navegação Anterior/Próximo
    const MODULOS_ORDEM = ['01','02','03','04','05','06','07','08']

    // Registra componente Alpine ANTES de qualquer await
    document.addEventListener('alpine:init', () => {
      Alpine.data('moduloPage', () => ({
        modulo:      null,  // dados vindos da API
        toc:         [],    // índice de seções (TOC)
        conteudoHtml: '',   // HTML renderizado — vinculado via x-html no template
        carregando:  true,
        erro:        '',
        tocAberto:   false, // drawer do TOC no mobile

        // ID do módulo atual extraído da query string (?id=01)
        get moduloId() {
          return new URLSearchParams(window.location.search).get('id') ?? '01'
        },

        // Módulo anterior e próximo para navegação
        get anteriorId() {
          const idx = MODULOS_ORDEM.indexOf(this.moduloId)
          return idx > 0 ? MODULOS_ORDEM[idx - 1] : null
        },
        get proximoId() {
          const idx = MODULOS_ORDEM.indexOf(this.moduloId)
          return idx < MODULOS_ORDEM.length - 1 ? MODULOS_ORDEM[idx + 1] : null
        },

        async init() {
          try {
            this.modulo = await apiFetch(`/modules/${this.moduloId}`)

            // Extrai TOC e renderiza o HTML ANTES de liberar o carregando
            this.toc = extrairTOC(this.modulo.conteudo_md)
            let html = renderizar(this.modulo.conteudo_md)
            this.conteudoHtml = adicionarAncorasTitulos(html)

            // Carrega seções já lidas (barra de progresso de leitura)
            try {
              const regsProgress = await apiFetch(`/progress`)
              // ProgressController retorna array de módulos; buscamos seções lidas
              // no array geral de itens de progresso do usuário via endpoint dedicado
              const secoesResp = await apiFetch(`/modules/${this.moduloId}/sections`)
              this.secoesLidas   = new Set((secoesResp.lidas ?? []))
              this.totalSecoes   = this.toc.length
              this.percentSecoes = this.totalSecoes > 0
                ? Math.round((this.secoesLidas.size / this.totalSecoes) * 100) : 0
            } catch { /* progresso de seções é opcional */ }

          } catch (e) {
            if (e.status === 401) { window.location.replace('/index.html'); return }
            this.erro = e.erro ?? 'Erro ao carregar o módulo.'
          } finally {
            this.carregando = false
            // Aguarda Alpine inserir o HTML no DOM via x-html
            await this.$nextTick()
            const conteudoEl = document.getElementById('conteudo-md')
            if (conteudoEl) {
              if (typeof Prism !== 'undefined') Prism.highlightAllUnder(conteudoEl)
              // Ativa os editores nos slots :::tente
              ativarEditoresTente(conteudoEl)
              // Ativa as áreas de reflexão nos slots :::reflexao
              ativarBlocosReflexao(conteudoEl)
            }
          }
        },

        // Renderiza markdown simples para uso inline no modal
        renderizarMd(texto) {
          return renderizar(texto ?? '')
        },

        // Atualiza título da página quando modulo carrega
        get tituloCompleto() {
          if (!this.modulo) return 'FetecPy — Módulo'
          return `Módulo ${this.modulo.id} — ${this.modulo.titulo}`
        },

        // ----------------------------------------------------------------
        // Estado do modal de exercício
        // ----------------------------------------------------------------

        modalAberto: false,
        exAtual: null,          // JSON completo do exercício aberto
        exFase: 'reflexao',     // 'reflexao' | 'editor' | 'concluido'

        // Respostas da seção "Antes de codar" (uma por pergunta)
        respostasAntes: [],

        // Código/texto do aluno no editor
        codigoAluno: '',
        textoAluno: '',

        // Contadores e estado de tentativas
        tentativas: 0,
        resultadoValidacao: null,
        dicaVisivel: false,
        solucaoVisivel: false,

        // Resultado da submissão ao backend
        xpGanho: 0,
        novasBadges: [],

        // Flags de execução
        rodando: false,
        testando: false,
        progressoValidacao: 0,  // 0-100 — controla a barra de progresso do timer de análise

        // ----------------------------------------------------------------
        // Estado do quiz
        // ----------------------------------------------------------------
        quizAberto: false,
        quizIdx: 0,             // índice da pergunta atual
        quizRespostas: [],      // índices das respostas escolhidas
        quizResultados: [],     // { correta, gabarito, explicacao } por pergunta
        quizConcluido: false,
        quizEnviando: false,
        quizStreakAnterior: 0,  // streak antes de iniciar o quiz, para detectar aumento

        // ----------------------------------------------------------------
        // Estado do progresso de seções
        // ----------------------------------------------------------------
        secoesLidas: new Set(),   // IDs das seções já marcadas como lidas
        totalSecoes: 0,           // total de seções do módulo (vindo da API)
        percentSecoes: 0,         // % de seções lidas

        // ----------------------------------------------------------------
        // Helpers do modal
        // ----------------------------------------------------------------

        // true se todos os campos "antes de codar" têm ao menos 10 chars
        get antesRespondido() {
          if (!this.exAtual?.antes_de_codar?.length) return true
          return this.respostasAntes.every(r => (r ?? '').trim().length >= 10)
        },

        // true se o validador é texto_livre (sem Python)
        get ehTextoLivre() {
          return this.exAtual?.validacao?.tipo === 'texto_livre'
        },

        // Após 3 tentativas com falha, libera o botão "Ver solução"
        get podeMostrarSolucao() {
          return this.tentativas >= 3
        },

        // ----------------------------------------------------------------
        // Ações do modal
        // ----------------------------------------------------------------

        /** Abre o modal carregando o exercício já disponível em modulo.exercicios */
        abrirExercicio(ex) {
          this.exAtual           = ex
          this.exFase            = 'reflexao'
          this.respostasAntes    = new Array(ex.antes_de_codar?.length ?? 0).fill('')
          this.codigoAluno       = ex.codigo_inicial ?? ''
          this.textoAluno        = ''
          this.tentativas        = 0
          this.resultadoValidacao = null
          this.dicaVisivel       = false
          this.solucaoVisivel    = false
          this.xpGanho           = 0
          this.novasBadges       = []
          this.rodando           = false
          this.testando          = false
          this.modalAberto       = true

          // Módulos 1-5: exige responder "antes de codar" antes do editor.
          // Módulos 6+: vai direto para o editor.
          const numMod = parseInt(this.moduloId, 10)
          if (numMod >= 6 || !ex.antes_de_codar?.length) {
            this.exFase = 'editor'
            // Monta editor CodeMirror após o nextTick (DOM precisa estar pronto)
            this.$nextTick(() => this._montarEditorModal())
          }
        },

        fecharModal() {
          this.modalAberto = false
          this.exAtual     = null
          // Destrói instância do CodeMirror para não vazar memória
          if (window._editorModal) {
            window._editorModal = null
          }
        },

        /** Avança da fase "antes de codar" para o editor */
        avancarParaEditor() {
          if (!this.antesRespondido) return
          this.exFase = 'editor'
          this.$nextTick(() => this._montarEditorModal())
        },

        /** Monta (ou re-monta) o editor CodeMirror no slot do modal */
        async _montarEditorModal() {
          if (this.ehTextoLivre) return // texto_livre usa textarea comum

          const slot = document.getElementById('modal-editor-slot')
          if (!slot) return

          // Limpa editor anterior se houver
          slot.innerHTML = ''
          window._editorModal = null

          const { criarEditor } = await import('/assets/js/editor.js')
          window._editorModal = criarEditor(slot, this.codigoAluno, () => {
            // Ctrl+Enter dispara "Testar"
            document.getElementById('btn-modal-testar')?.click()
          })
        },

        /** Roda o código sem testar (apenas mostra saída) */
        async rodarCodigo() {
          const codigo = window._editorModal?.getValue() ?? this.codigoAluno
          if (!codigo.trim()) return

          this.rodando = true
          this.resultadoValidacao = null

          try {
            if (!pyodidePronto()) mostrarOverlayPyodide(true)
            const { stdout, stderr } = await runPython(codigo)
            mostrarOverlayPyodide(false)

            // Exibe saída bruta sem validar
            this.resultadoValidacao = {
              passou: null, // null = só saída, sem veredicto
              saidaBruta: stdout || stderr || '(sem saída)',
              ehSaidaBruta: true,
            }
          } catch (e) {
            this.resultadoValidacao = { passou: false, erro: e.message, casos: [] }
          } finally {
            this.rodando = false
          }
        },

        /** Valida o código/texto contra os casos de teste */
        async testarCodigo() {
          const codigo = this.ehTextoLivre
            ? this.textoAluno
            : (window._editorModal?.getValue() ?? this.codigoAluno)

          if (!codigo.trim()) return

          this.testando = true
          this.resultadoValidacao = null

          try {
            let resultado

            if (this.ehTextoLivre) {
              // Para texto livre, a validação é instantânea (só conta caracteres).
              // Validamos imediatamente mas exibimos um timer visual de ~2,5s para
              // reforçar a percepção de que o sistema está analisando o raciocínio.
              resultado = validateTextLivre(
                this.textoAluno,
                this.exAtual.validacao?.minimo_caracteres ?? 80
              )
              await this._animarProgresso(2500)
            } else {
              // Exercícios com código: roda no Pyodide (pode demorar segundos)
              if (!pyodidePronto()) mostrarOverlayPyodide(true)
              resultado = await validar(this.exAtual, codigo, this.textoAluno)
              mostrarOverlayPyodide(false)
            }

            this.resultadoValidacao = resultado

            if (resultado.passou) {
              await this.enviarSubmissao('concluido', codigo)
              // Atualiza a medalha AQUI (garantido), independente do API call
              this._marcarConcluido('concluido')
              this.exFase = 'concluido'
              // Confetes apenas quando resolvido sem ajuda
              this.$nextTick(() => dispararConfetes())
            } else {
              this.tentativas++
              await this.salvarCodigo(codigo)
            }
          } catch (e) {
            mostrarOverlayPyodide(false)
            this.resultadoValidacao = { passou: false, erro: e.message, casos: [] }
          } finally {
            this.testando = false
          }
        },

        /**
         * Anima a barra de progresso de validação por `duracaoMs` milissegundos.
         * Usa easing out quadrático: rápido no início, desacelera no final —
         * mais natural do que progresso linear.
         */
        async _animarProgresso(duracaoMs) {
          this.progressoValidacao = 0
          const intervaloMs = 30
          const totalPassos = Math.round(duracaoMs / intervaloMs)
          let passo = 0

          await new Promise(resolve => {
            const timer = setInterval(() => {
              passo++
              const t = Math.min(passo / totalPassos, 1)
              // f(t) = 1 - (1-t)² — chega em 100% de forma suave
              this.progressoValidacao = Math.round(100 * (1 - (1 - t) * (1 - t)))
              if (passo >= totalPassos) {
                clearInterval(timer)
                this.progressoValidacao = 100
                resolve()
              }
            }, intervaloMs)
          })

          // Pequena pausa com barra cheia antes de revelar o resultado
          await new Promise(r => setTimeout(r, 250))
          this.progressoValidacao = 0
        },

        /** Envia a solução (botão "Ver solução") */
        async usarSolucao() {
          const codigo = window._editorModal?.getValue() ?? this.codigoAluno
          await this.enviarSubmissao('concluido_com_ajuda', codigo)
          this._marcarConcluido('concluido_com_ajuda')
          this.solucaoVisivel = true
          this.exFase = 'concluido'
        },

        /** Pula sem ver solução — registra como "tentado" sem XP */
        async pularExercicio() {
          const codigo = window._editorModal?.getValue() ?? this.codigoAluno
          await this.enviarSubmissao('tentado', codigo)
          this.fecharModal()
        },

        /** Salva o código automaticamente sem alterar o status */
        async salvarCodigo(codigo) {
          try {
            await apiFetch(`/modules/${this.moduloId}/exercises/${this.exAtual.id.split('-')[1]}/submit`, {
              method: 'POST',
              body: JSON.stringify({ codigo, status: 'tentado', tentativas: this.tentativas }),
            })
          } catch { /* silencioso — salvar é best-effort */ }
        },

        /** Envia a submissão ao backend e dispara notificações de gamificação */
        async enviarSubmissao(status, codigo) {
          try {
            const exId         = this.exAtual.id.split('-')[1] // "01-ex03" → "ex03"
            const streakBefore = this.modulo?._streakAtual ?? 0
            const resp         = await apiFetch(
              `/modules/${this.moduloId}/exercises/${exId}/submit`,
              {
                method: 'POST',
                body: JSON.stringify({
                  codigo,
                  status,
                  tentativas: this.tentativas,
                  hora_local: new Date().toTimeString().slice(0, 5),
                }),
              }
            )
            this.xpGanho     = resp.xp_ganho    ?? 0
            this.novasBadges = resp.novas_badges ?? []
            // Guarda streak atual para comparação na próxima submissão
            if (this.modulo) this.modulo._streakAtual = resp.streak_dias ?? 0
            if (resp.solucao) {
              this.exAtual = { ...this.exAtual, solucao: resp.solucao }
            }
            // Dispara toasts de XP/badge/streak
            processarRespostaGamificacao(resp, streakBefore)
          } catch { /* não bloqueia a UI por erro de rede */ }
        },

        // ----------------------------------------------------------------
        // Métodos do quiz
        // ----------------------------------------------------------------

        /** Abre o quiz do módulo */
        abrirQuiz() {
          this.quizIdx        = 0
          this.quizRespostas  = []
          this.quizResultados = []
          this.quizConcluido  = false
          this.quizStreakAnterior = this.modulo?._streakAtual ?? 0
          this.quizAberto = true
        },

        /** Marca a opção selecionada para a pergunta atual */
        selecionarOpcaoQuiz(indice) {
          if (this.quizResultados[this.quizIdx]) return  // já respondida
          this.quizRespostas[this.quizIdx] = indice
        },

        /** Envia a resposta da pergunta atual ao backend */
        async confirmarRespostaQuiz() {
          if (this.quizEnviando) return
          const perguntas = this.modulo?.quiz ?? []
          const pergunta  = perguntas[this.quizIdx]
          if (!pergunta) return

          const resposta = this.quizRespostas[this.quizIdx]
          if (resposta === undefined) return  // usuário não selecionou nada

          this.quizEnviando = true
          try {
            const streakBefore = this.modulo?._streakAtual ?? 0
            const resp = await apiFetch(`/modules/${this.moduloId}/quiz/submit`, {
              method: 'POST',
              body: JSON.stringify({
                pergunta_id: pergunta.id,
                resposta,
                hora_local: new Date().toTimeString().slice(0, 5),
              }),
            })
            // Guarda resultado desta pergunta
            this.quizResultados[this.quizIdx] = {
              correta:    resp.correta,
              gabarito:   resp.gabarito,
              explicacao: resp.explicacao ?? null,
            }
            if (this.modulo) this.modulo._streakAtual = resp.streak_dias ?? 0
            processarRespostaGamificacao(resp, streakBefore)
          } catch { /* não bloqueia — resultado visual não depende do backend */
            this.quizResultados[this.quizIdx] = { correta: null, gabarito: -1, explicacao: null }
          } finally {
            this.quizEnviando = false
          }
        },

        /** Avança para a próxima pergunta ou encerra o quiz */
        proximaPerguntaQuiz() {
          const total = this.modulo?.quiz?.length ?? 0
          if (this.quizIdx < total - 1) {
            this.quizIdx++
          } else {
            this.quizConcluido = true
          }
        },

        /** Calcula acertos no quiz concluído */
        get quizAcertos() {
          return this.quizResultados.filter(r => r?.correta === true).length
        },

        /** Marca uma seção do TOC como lida */
        async marcarSecao(secaoId) {
          if (this.secoesLidas.has(secaoId)) return
          this.secoesLidas.add(secaoId)
          this.percentSecoes = this.totalSecoes > 0
            ? Math.round((this.secoesLidas.size / this.totalSecoes) * 100) : 0
          try {
            await apiFetch(`/modules/${this.moduloId}/sections/${encodeURIComponent(secaoId)}`, {
              method: 'POST', body: '{}',
            })
          } catch { /* best-effort */ }
        },

        /**
         * Atualiza o status_aluno no array local de exercícios para a medalha
         * aparecer imediatamente no card sem precisar recarregar a página.
         *
         * Separado de enviarSubmissao() para garantir execução mesmo se o
         * API call falhar — a medalha é feedback de UX, não depende do backend.
         * Usa splice() porque Alpine v3 só detecta mutações via métodos nativos
         * de array (splice/push/pop), não por atribuição direta de índice.
         */
        _marcarConcluido(status) {
          if (!this.exAtual || !this.modulo?.exercicios) return
          const id  = this.exAtual.id
          const idx = this.modulo.exercicios.findIndex(e => e.id === id)
          if (idx === -1) return
          this.modulo.exercicios.splice(idx, 1, {
            ...this.modulo.exercicios[idx],
            status_aluno: status,
          })
        },
      }))
    })

    // ----------------------------------------------------------------
    // Ativação dos blocos :::tente como editores interativos
    // ----------------------------------------------------------------

    /**
     * Encontra todos os slots .tente-editor-area dentro do conteúdo renderizado
     * e monta um editor CodeMirror + botão Rodar + área de saída em cada um.
     *
     * O Pyodide só é carregado quando o aluno clica "Rodar" pela primeira vez,
     * para não penalizar o tempo de carregamento inicial da página.
     */
    async function ativarEditoresTente(conteudoEl) {
      const slots = conteudoEl.querySelectorAll('.tente-editor-area[data-ready="false"]')
      if (!slots.length) return

      // Import dinâmico: carrega o CodeMirror só quando há editores na página,
      // evitando bloquear o alpine:init com requisições de rede desnecessárias
      const { criarEditor } = await import('/assets/js/editor.js')

      slots.forEach((slot, idx) => {
        slot.setAttribute('data-ready', 'true')

        // Container principal do editor
        slot.innerHTML = `
          <div class="tente-wrapper mt-2">
            <div class="tente-codemirror border border-slate-700 rounded-lg overflow-hidden"></div>
            <div class="flex items-center gap-3 mt-2">
              <button
                class="tente-btn-rodar flex items-center gap-2 bg-python-500 hover:bg-python-400 text-slate-950 font-semibold text-sm px-4 py-2 rounded-lg transition-colors"
              >
                <span class="tente-icone-rodar">▶</span>
                <span class="tente-label-rodar">Rodar</span>
              </button>
              <span class="tente-status text-xs text-slate-500"></span>
            </div>
            <div class="tente-saida hidden mt-3 rounded-lg overflow-hidden border border-slate-700">
              <div class="flex items-center justify-between bg-slate-800 px-3 py-1.5">
                <span class="text-xs text-slate-400 font-mono">saída</span>
                <button class="tente-btn-limpar text-xs text-slate-600 hover:text-slate-400 transition-colors">limpar</button>
              </div>
              <pre class="tente-output font-mono text-sm text-slate-300 bg-slate-900 p-4 overflow-x-auto max-h-64 whitespace-pre-wrap"></pre>
            </div>
          </div>
        `

        // Monta o editor CodeMirror no elemento correto
        const cmEl   = slot.querySelector('.tente-codemirror')
        const btnRun = slot.querySelector('.tente-btn-rodar')
        const status = slot.querySelector('.tente-status')
        const saida  = slot.querySelector('.tente-saida')
        const output = slot.querySelector('.tente-output')
        const btnLimpar = slot.querySelector('.tente-btn-limpar')

        // Cria o editor com callback para Ctrl+Enter também executar
        const editor = criarEditor(cmEl, '', () => btnRun.click())

        // Limpa a saída
        btnLimpar.addEventListener('click', () => {
          saida.classList.add('hidden')
          output.textContent = ''
        })

        // Botão Rodar: carrega Pyodide se necessário e executa o código
        btnRun.addEventListener('click', async () => {
          const codigo = editor.getValue().trim()
          if (!codigo) { status.textContent = 'Escreva algo primeiro.'; return }

          btnRun.disabled = true
          status.textContent = ''

          // Se Pyodide ainda não foi carregado, mostra progresso
          if (!pyodidePronto()) {
            mostrarOverlayPyodide(true)
            status.textContent = 'Carregando Python...'
          }

          try {
            const { stdout, stderr } = await runPython(codigo)
            mostrarOverlayPyodide(false)

            // Exibe saída (stdout em branco, stderr em vermelho)
            saida.classList.remove('hidden')
            if (stdout || stderr) {
              output.innerHTML =
                (stdout ? escapeHtml(stdout) : '') +
                (stderr ? `<span class="text-red-400">${escapeHtml(stderr)}</span>` : '')
            } else {
              output.innerHTML = '<span class="text-slate-500 italic">Nenhuma saída.</span>'
            }

            status.textContent = ''
          } catch (e) {
            mostrarOverlayPyodide(false)
            output.textContent = '❌ ' + (e.message ?? 'Erro ao executar.')
            saida.classList.remove('hidden')
          } finally {
            btnRun.disabled = false
          }
        })
      })
    }

    /** Exibe ou oculta o overlay de carregamento do Pyodide */
    function mostrarOverlayPyodide(visivel) {
      let overlay = document.getElementById('overlay-pyodide')
      if (!overlay) {
        overlay = document.createElement('div')
        overlay.id = 'overlay-pyodide'
        overlay.innerHTML = `
          <div class="bg-slate-900 border border-slate-700 rounded-2xl p-8 text-center shadow-2xl max-w-xs w-full">
            <div class="text-4xl mb-4">🐍</div>
            <p class="text-slate-200 font-semibold mb-2">Carregando Python...</p>
            <p class="text-slate-400 text-sm mb-4">O ambiente Python está sendo instalado no seu navegador. Acontece só uma vez.</p>
            <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
              <div id="overlay-pyodide-barra" class="h-full bg-python-500 rounded-full transition-all duration-500" style="width:30%"></div>
            </div>
          </div>
        `
        overlay.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm'
        document.body.appendChild(overlay)
      }
      overlay.style.display = visivel ? 'flex' : 'none'
    }

    // ----------------------------------------------------------------
    // Ativação dos blocos :::reflexao (texto livre + gabarito)
    // ----------------------------------------------------------------

    /**
     * Ativa todos os slots .reflexao-area com textarea, contador de caracteres,
     * botão "Ver resposta sugerida" (disponível após mínimo de caracteres)
     * e botão "Marquei como feito".
     *
     * O gabarito fica em base64 no data-resposta e só é decodificado e exibido
     * quando o aluno já escreveu sua própria resposta — incentiva o esforço antes
     * de ver o modelo.
     */
    function ativarBlocosReflexao(conteudoEl) {
      const MIN_CHARS = 30 // mínimo de caracteres para liberar o gabarito

      const slots = conteudoEl.querySelectorAll('.reflexao-area[data-ready="false"]')
      slots.forEach(slot => {
        slot.setAttribute('data-ready', 'true')
        const respostaB64 = slot.dataset.resposta ?? ''
        const temGabarito = respostaB64.length > 0

        slot.innerHTML = `
          <div class="reflexao-wrapper space-y-3">
            <textarea
              class="reflexao-textarea w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-slate-200 text-[1rem] leading-relaxed resize-y focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent placeholder-slate-600 transition-colors"
              rows="5"
              placeholder="Escreva sua resposta aqui..."
            ></textarea>

            <div class="flex items-center justify-between gap-3 flex-wrap">
              <span class="reflexao-contador text-xs text-slate-500">0 / ${MIN_CHARS} caracteres mínimos</span>

              <div class="flex items-center gap-2">
                ${temGabarito ? `
                <button class="reflexao-btn-gabarito hidden bg-teal-500/20 hover:bg-teal-500/30 border border-teal-500/40 text-teal-300 text-sm font-medium px-4 py-2 rounded-lg transition-colors">
                  Ver resposta sugerida
                </button>` : ''}
                <button class="reflexao-btn-feito hidden bg-python-500 hover:bg-python-400 text-slate-950 text-sm font-semibold px-4 py-2 rounded-lg transition-colors">
                  ✓ Marquei como feito
                </button>
              </div>
            </div>

            <!-- Gabarito — oculto até o aluno clicar -->
            ${temGabarito ? `
            <div class="reflexao-gabarito hidden border border-teal-500/30 bg-teal-500/8 rounded-xl p-5">
              <p class="text-teal-300 font-semibold text-sm mb-3">💡 Resposta sugerida</p>
              <div class="reflexao-gabarito-conteudo text-slate-300 text-[1rem] leading-relaxed"></div>
              <p class="text-slate-500 text-xs mt-3 italic">Compare com a sua resposta. Não existe uma única resposta certa — o importante é que os passos sejam precisos e completos.</p>
            </div>` : ''}
          </div>
        `

        const textarea  = slot.querySelector('.reflexao-textarea')
        const contador  = slot.querySelector('.reflexao-contador')
        const btnGabarito = slot.querySelector('.reflexao-btn-gabarito')
        const btnFeito  = slot.querySelector('.reflexao-btn-feito')
        const gabarito  = slot.querySelector('.reflexao-gabarito')
        const gabConteudo = slot.querySelector('.reflexao-gabarito-conteudo')

        // Atualiza contador e libera botões conforme o aluno escreve
        textarea.addEventListener('input', () => {
          const len = textarea.value.trim().length
          const atingiu = len >= MIN_CHARS

          contador.textContent = `${len} / ${MIN_CHARS} caracteres mínimos`
          contador.className   = `reflexao-contador text-xs ${atingiu ? 'text-teal-400' : 'text-slate-500'}`

          if (btnGabarito) btnGabarito.classList.toggle('hidden', !atingiu)
          btnFeito.classList.toggle('hidden', !atingiu)
        })

        // Mostra o gabarito decodificando o base64
        if (btnGabarito && gabarito && gabConteudo) {
          btnGabarito.addEventListener('click', () => {
            try {
              const textoGabarito = decodeURIComponent(escape(atob(respostaB64)))
              // Renderiza o gabarito como markdown simples (lista numerada, etc.)
              gabConteudo.innerHTML = textoGabarito
                .split('\n')
                .map(linha => `<p class="mb-1">${escapeHtml(linha)}</p>`)
                .join('')
            } catch {
              gabConteudo.textContent = 'Erro ao carregar resposta.'
            }
            gabarito.classList.remove('hidden')
            btnGabarito.classList.add('hidden') // esconde o botão após ver
          })
        }

        // Botão "Marquei como feito" — por ora apenas feedback visual
        // (persistência será implementada no Prompt 6.1 com ProgressService)
        btnFeito.addEventListener('click', () => {
          btnFeito.textContent = '✓ Feito!'
          btnFeito.disabled = true
          btnFeito.className = 'text-sm font-semibold px-4 py-2 rounded-lg bg-slate-700 text-slate-400 cursor-default'
          textarea.disabled = true
          textarea.className = textarea.className + ' opacity-60'
        })
      })
    }

    /**
     * Dispara confetes e serpentinas ao concluir um exercício sem ajuda.
     * Três rajadas em sequência: centro + esquerda + direita, para preencher a tela.
     */
    function dispararConfetes() {
      if (typeof confetti === 'undefined') return

      const cores = ['#22c55e', '#4ade80', '#fbbf24', '#f59e0b', '#60a5fa', '#f472b6', '#a78bfa']

      // Rajada central — chuva vertical
      confetti({
        particleCount: 130,
        spread: 80,
        origin: { x: 0.5, y: 0.45 },
        colors: cores,
        ticks: 200,
      })

      // Serpentinas da esquerda, disparadas 300ms depois
      setTimeout(() => {
        confetti({
          particleCount: 70,
          angle: 65,
          spread: 55,
          origin: { x: 0, y: 0.5 },
          colors: ['#22c55e', '#fbbf24', '#f472b6'],
          ticks: 200,
        })
      }, 300)

      // Serpentinas da direita, 300ms depois da esquerda
      setTimeout(() => {
        confetti({
          particleCount: 70,
          angle: 115,
          spread: 55,
          origin: { x: 1, y: 0.5 },
          colors: ['#4ade80', '#60a5fa', '#a78bfa'],
          ticks: 200,
        })
      }, 600)
    }

    /** Escapa caracteres HTML para exibição segura na saída do console */
    function escapeHtml(texto) {
      return texto
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
    }

    // Pré-aquece o Pyodide em segundo plano após a página carregar,
    // assim quando o aluno clicar "Rodar" a espera é menor
    window.addEventListener('load', () => {
      // Delay de 3s para não competir com o carregamento inicial da página
      setTimeout(() => {
        carregarPyodide().catch(() => {}) // silencioso — tentativa best-effort
      }, 3000)
    })

    // Verificação de sessão com .then() — não usar await top-level aqui
    verificarSessao().then(logado => {
      if (!logado) window.location.replace('/index.html')
    })
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>

            <div @click.stop class="w-full max-w-lg bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl p-6">

              <!-- Concluído -->
              <template x-if="quizConcluido">
                <div class="text-center">
                  <div class="text-5xl mb-3" x-text="quizAcertos === modulo.quiz.length ? '🏆' : (quizAcertos >= modulo.quiz.length / 2 ? '🎯' : '📚')"></div>
                  <h3 class="text-xl font-bold text-white mb-1">Quiz concluído!</h3>
                  <p class="text-slate-400 text-sm mb-4">
                    Você acertou <span class="text-emerald-400 font-semibold" x-text="quizAcertos"></span>
                    de <span x-text="modulo.quiz.length"></span> perguntas.
                  </p>
                  <button @click="quizAberto = false" class="bg-slate-700 hover:bg-slate-600 text-white px-6 py-2 rounded-lg text-sm font-semibold transition-colors w-full">
                    Fechar
                  </button>
                </div>
              </template>

              <!-- Em andamento -->
              <template x-if="!quizConcluido && modulo.quiz && modulo.quiz[quizIdx]">
                <div>
                  <!-- Progresso -->
                  <div class="flex items-center justify-between mb-4">
                    <span class="text-xs text-slate-500" x-text="`Pergunta ${quizIdx + 1} de ${modulo.quiz.length}`"></span>
                    <button @click="quizAberto = false" class="text-slate-600 hover:text-slate-400 transition-colors">
                      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                  </div>
                  <div class="w-full h-1 bg-slate-800 rounded mb-5">
                    <div class="h-1 bg-violet-600 rounded transition-all" :style="`width: ${Math.round(((quizIdx) / modulo.quiz.length) * 100)}%`"></div>
                  </div>

                  <!-- Pergunta -->
                  <p class="text-white font-medium mb-4" x-text="modulo.quiz[quizIdx].pergunta"></p>

                  <!-- Opções -->
                  <div class="flex flex-col gap-2 mb-5">
                    <template x-for="(opcao, i) in modulo.quiz[quizIdx].opcoes" :key="i">
                      <button
                        @click="selecionarOpcaoQuiz(i)"
                        :disabled="!!quizResultados[quizIdx]"
                        :class="{
                          'border-violet-500 bg-violet-900/30': quizRespostas[quizIdx] === i && !quizResultados[quizIdx],
                          'border-emerald-500 bg-emerald-900/30 text-emerald-300': quizResultados[quizIdx] && quizResultados[quizIdx].gabarito === i,
                          'border-red-500/60 bg-red-900/20 text-red-300': quizResultados[quizIdx] && quizRespostas[quizIdx] === i && !quizResultados[quizIdx].correta && quizResultados[quizIdx].gabarito !== i,
                          'border-slate-700 hover:border-slate-500': quizRespostas[quizIdx] !== i && !quizResultados[quizIdx],
                        }"
                        class="w-full text-left px-4 py-3 rounded-lg border text-sm text-slate-300 transition-colors disabled:cursor-default"
                        x-text="opcao"
                      ></button>
                    </template>
                  </div>

                  <!-- Explicação após responder -->
                  <template x-if="quizResultados[quizIdx]">
                    <div class="mb-4 p-3 rounded-lg text-sm"
                      :class="quizResultados[quizIdx].correta ? 'bg-emerald-900/30 text-emerald-300 border border-emerald-700/50' : 'bg-red-900/20 text-red-300 border border-red-700/30'">
                      <span x-text="quizResultados[quizIdx].correta ? '✓ Correto! ' : '✗ Incorreto. '"></span>
                      <span x-text="quizResultados[quizIdx].explicacao ?? ''"></span>
                    </div>
                  </template>

                  <!-- Botões de ação -->
                  <div class="flex gap-2">
                    <template x-if="!quizResultados[quizIdx]">
                      <button @click="confirmarRespostaQuiz()" :disabled="quizRespostas[quizIdx] === undefined || quizEnviando" class="flex-1 bg-violet-600 disabled:opacity-40 hover:bg-violet-500 text-white font-semibold px-4 py-2 rounded-lg text-sm transition-colors">
                        <span x-text="quizEnviando ? 'Verificando…' : 'Confirmar'"></span>
                      </button>
                    </template>
                    <template x-if="!!quizResultados[quizIdx]">
                      <button @click="proximaPerguntaQuiz()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold px-4 py-2 rounded-lg text-sm transition-colors">
                        <span x-text="quizIdx < modulo.quiz.length - 1 ? 'Próxima →' : 'Ver resultado'"></span>
                      </button>
                    </template>
                  </div>
                </div>
              </template>

            </div>
          </div>

          <!-- Navegação Anterior / Próximo -->
          <nav class="mt-12 pt-8 border-t border-slate-800 flex items-center justify-between gap-4">

            <!-- Anterior -->
            <div class="flex-1">
              <template x-if="anteriorId">
                <a :href="'/module.html?id=' + anteriorId" class="group flex items-center gap-3 text-slate-400 hover:text-slate-200 transition-colors">
                  <span class="w-8 h-8 rounded-lg border border-slate-700 group-hover:border-slate-500 flex items-center justify-center transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
                    </svg>
                  </span>
                  <div>
                    <p class="text-xs text-slate-600">Anterior</p>
                    <p class="text-sm font-medium" x-text="'Módulo ' + anteriorId"></p>
                  </div>
                </a>
              </template>
            </div>

            <!-- Voltar ao dashboard -->
            <a href="/app.html" class="text-xs text-slate-600 hover:text-slate-400 transition-colors">Dashboard</a>

            <!-- Próximo -->
            <div class="flex-1 flex justify-end">
              <template x-if="proximoId">
                <a :href="'/module.html?id=' + proximoId" class="group flex items-center gap-3 text-slate-400 hover:text-slate-200 transition-colors text-right">
                  <div>
                    <p class="text-xs text-slate-600">Próximo</p>
                    <p class="text-sm font-medium" x-text="'Módulo ' + proximoId"></p>
                  </div>
                  <span class="w-8 h-8 rounded-lg border border-slate-700 group-hover:border-slate-500 flex items-center justify-center transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
                    </svg>
                  </span>
                </a>
              </template>
            </div>

          </nav>
        </div>
      </template>

    </main>
  </div>

  <!-- ================================================================
       Modal de exercício
       Cobre toda a tela com backdrop. Dentro: três fases — reflexão,
       editor e conclusão. A fase inicial depende do módulo (1-5 exigem
       "antes de codar"; 6+ vão direto para o editor).
       ================================================================ -->
  <div
    x-show="modalAberto"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    @keydown.escape.window="fecharModal()"
    class="fixed inset-0 z-40 flex items-start justify-center bg-black/70 backdrop-blur-sm p-4 pt-16 overflow-y-auto"
  >
    <div
      @click.stop
      class="w-full max-w-2xl bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl"
      x-show="modalAberto"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 scale-95"
      x-transition:enter-end="opacity-100 scale-100"
    >
      <!-- Cabeçalho do modal -->
      <div class="flex items-start justify-between gap-4 p-6 border-b border-slate-800">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <span
              class="text-xs font-semibold px-2 py-0.5 rounded-full"
              :class="{
                'bg-emerald-500/20 text-emerald-400': exAtual?.dificuldade === 'facil',
                'bg-amber-500/20  text-amber-400':    exAtual?.dificuldade === 'medio',
                'bg-rose-500/20   text-rose-400':     exAtual?.dificuldade === 'desafio'
              }"
              x-text="exAtual?.dificuldade"
            ></span>
            <span class="text-xs text-slate-500" x-text="(exAtual?.xp ?? 0) + ' XP'"></span>
          </div>
          <h3 class="text-lg font-bold text-slate-100" x-text="exAtual?.titulo"></h3>
        </div>
        <button @click="fecharModal()" class="shrink-0 text-slate-500 hover:text-slate-300 p-1 rounded transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- ── Fase 1: Antes de codar ──────────────────────────────── -->
      <template x-if="exFase === 'reflexao' && exAtual?.antes_de_codar?.length">
        <div class="p-6 space-y-5">
          <p class="text-sm font-semibold text-python-400 uppercase tracking-wider">Pense antes de codar</p>
          <p class="text-slate-400 text-sm">Responda às perguntas abaixo antes de ver o editor. Não há respostas certas — o objetivo é ativar o raciocínio.</p>

          <template x-for="(pergunta, idx) in exAtual.antes_de_codar" :key="idx">
            <div>
              <label class="block text-sm text-slate-300 mb-2 leading-relaxed" x-text="(idx+1) + '. ' + pergunta"></label>
              <textarea
                x-model="respostasAntes[idx]"
                rows="2"
                class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-python-500 focus:border-transparent placeholder-slate-600 transition-colors"
                placeholder="Sua resposta..."
              ></textarea>
            </div>
          </template>

          <div class="flex justify-end pt-2">
            <button
              @click="avancarParaEditor()"
              :disabled="!antesRespondido"
              class="bg-python-500 hover:bg-python-400 disabled:bg-slate-700 disabled:text-slate-500 text-slate-950 disabled:cursor-not-allowed font-semibold text-sm px-6 py-2.5 rounded-lg transition-colors"
            >
              Avançar para o exercício →
            </button>
          </div>
        </div>
      </template>

      <!-- ── Fase 2: Editor ─────────────────────────────────────── -->
      <template x-if="exFase === 'editor'">
        <div class="p-6 space-y-5">

          <!-- Enunciado -->
          <div class="text-slate-300 text-[0.95rem] leading-relaxed prose prose-invert max-w-none" x-html="exAtual ? renderizarMd(exAtual.enunciado) : ''"></div>

          <!-- Editor: textarea para texto_livre, CodeMirror para código -->
          <template x-if="ehTextoLivre">
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2"
                x-text="exAtual.validacao?.instrucao ?? 'Sua resposta'"></label>
              <textarea
                x-model="textoAluno"
                rows="8"
                class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-slate-200 text-[0.95rem] resize-y focus:outline-none focus:ring-2 focus:ring-python-500 focus:border-transparent placeholder-slate-600 font-mono transition-colors"
                placeholder="Escreva aqui..."
              ></textarea>
              <div class="text-xs text-slate-500 mt-1 text-right"
                x-text="textoAluno.trim().length + ' / ' + (exAtual.validacao?.minimo_caracteres ?? 80) + ' caracteres mínimos'">
              </div>
            </div>
          </template>

          <template x-if="!ehTextoLivre">
            <div>
              <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Seu código</div>
              <!-- Slot onde o CodeMirror é montado dinamicamente -->
              <div id="modal-editor-slot" class="border border-slate-700 rounded-lg overflow-hidden min-h-[160px]"></div>
            </div>
          </template>

          <!-- Barra de progresso — aparece durante análise de texto livre -->
          <template x-if="testando && ehTextoLivre">
            <div class="rounded-xl border border-python-500/30 bg-python-500/8 p-4 space-y-3">
              <div class="flex items-center gap-3">
                <!-- Ícone de spinning -->
                <svg class="animate-spin w-4 h-4 text-python-400 shrink-0" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
                <span class="text-python-400 text-sm font-medium">Analisando sua lógica...</span>
                <span class="text-slate-500 text-xs ml-auto" x-text="progressoValidacao + '%'"></span>
              </div>
              <!-- Barra que cresce com easing ao longo de ~2,5s -->
              <div class="h-2 bg-slate-700 rounded-full overflow-hidden">
                <div
                  class="h-full bg-python-500 rounded-full transition-[width] duration-75 ease-linear"
                  :style="`width: ${progressoValidacao}%`"
                ></div>
              </div>
            </div>
          </template>

          <!-- Resultado da validação -->
          <template x-if="resultadoValidacao">
            <div>
              <!-- Saída bruta (botão Rodar) -->
              <template x-if="resultadoValidacao.ehSaidaBruta">
                <div class="rounded-lg border border-slate-700 overflow-hidden">
                  <div class="bg-slate-800 px-3 py-1.5 text-xs text-slate-400 font-mono">saída</div>
                  <pre class="bg-slate-900 p-4 text-sm text-slate-300 font-mono whitespace-pre-wrap max-h-48 overflow-y-auto" x-text="resultadoValidacao.saidaBruta"></pre>
                </div>
              </template>

              <!-- Resultado da validação com casos -->
              <template x-if="!resultadoValidacao.ehSaidaBruta && resultadoValidacao.passou !== null">
                <div
                  class="rounded-xl border p-4 space-y-3"
                  :class="resultadoValidacao.passou ? 'border-emerald-500/30 bg-emerald-500/8' : 'border-red-500/30 bg-red-500/8'"
                >
                  <div class="flex items-center gap-2 font-semibold text-sm"
                    :class="resultadoValidacao.passou ? 'text-emerald-400' : 'text-red-400'"
                  >
                    <span x-text="resultadoValidacao.passou ? '✓ Todos os testes passaram!' : '✗ Alguns testes falharam'"></span>
                  </div>

                  <!-- Detalhes dos casos de teste -->
                  <template x-if="resultadoValidacao.casos && resultadoValidacao.casos.length">
                    <div class="space-y-2">
                      <template x-for="(c, i) in resultadoValidacao.casos" :key="i">
                        <div
                          class="rounded-lg px-3 py-2 text-xs font-mono border"
                          :class="c.passou ? 'border-emerald-500/20 bg-emerald-500/5 text-emerald-300' : 'border-red-500/20 bg-red-500/5 text-red-300'"
                        >
                          <template x-if="!c.passou && c.obtido !== undefined">
                            <div>
                              <div class="text-slate-500 mb-0.5" x-text="'Entrada: ' + (c.input || '—')"></div>
                              <div x-text="'Esperado: ' + c.esperado"></div>
                              <div x-text="'Obtido:   ' + c.obtido"></div>
                            </div>
                          </template>
                          <template x-if="c.passou || c.obtido === undefined">
                            <span x-text="c.obtido || ('Teste ' + (i+1) + (c.passou ? ': ✓' : ': ✗'))"></span>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>

                  <!-- Erro de execução -->
                  <template x-if="resultadoValidacao.erro && !resultadoValidacao.passou">
                    <pre class="text-xs text-red-300 font-mono whitespace-pre-wrap" x-text="resultadoValidacao.erro"></pre>
                  </template>
                </div>
              </template>
            </div>
          </template>

          <!-- Dica (oculta até clicar) -->
          <template x-if="dicaVisivel && exAtual.dica">
            <div class="rounded-xl border border-amber-500/30 bg-amber-500/8 p-4">
              <p class="text-xs font-semibold text-amber-400 uppercase tracking-wider mb-1">Dica</p>
              <p class="text-slate-300 text-sm leading-relaxed" x-text="exAtual.dica"></p>
            </div>
          </template>

          <!-- Solução (oculta até clicar — só após 3+ tentativas) -->
          <template x-if="solucaoVisivel && exAtual.solucao">
            <div class="rounded-xl border border-slate-600 bg-slate-800/50 p-4">
              <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Solução</p>
              <pre class="text-sm text-slate-300 font-mono whitespace-pre-wrap" x-text="exAtual.solucao"></pre>
            </div>
          </template>

          <!-- Barra de ações -->
          <div class="flex flex-wrap items-center gap-3 pt-2 border-t border-slate-800">

            <!-- Rodar (sem testar) — só para exercícios com código -->
            <template x-if="!ehTextoLivre">
              <button
                id="btn-modal-rodar"
                @click="rodarCodigo()"
                :disabled="rodando || testando"
                class="flex items-center gap-1.5 bg-slate-700 hover:bg-slate-600 disabled:opacity-50 text-slate-200 text-sm font-medium px-4 py-2 rounded-lg transition-colors"
              >
                <span x-text="rodando ? '...' : '▶ Rodar'"></span>
              </button>
            </template>

            <!-- Testar -->
            <button
              id="btn-modal-testar"
              @click="testarCodigo()"
              :disabled="rodando || testando"
              class="flex items-center gap-1.5 bg-python-500 hover:bg-python-400 disabled:opacity-50 text-slate-950 font-semibold text-sm px-5 py-2 rounded-lg transition-colors"
            >
              <span x-text="testando ? 'Testando...' : '✓ Testar'"></span>
            </button>

            <!-- Ver dica -->
            <template x-if="exAtual?.dica && !dicaVisivel">
              <button
                @click="dicaVisivel = true"
                class="text-sm text-amber-400 hover:text-amber-300 transition-colors"
              >
                💡 Ver dica
              </button>
            </template>

            <!-- Ver solução (após 3 tentativas) -->
            <template x-if="podeMostrarSolucao && !solucaoVisivel">
              <button
                @click="usarSolucao()"
                class="text-sm text-slate-400 hover:text-slate-300 transition-colors"
                :class="tentativas >= 5 ? 'text-amber-400 hover:text-amber-300 font-semibold' : ''"
              >
                <span x-text="tentativas >= 5 ? '💡 Ver solução (recomendado)' : 'Ver solução'"></span>
              </button>
            </template>

            <!-- Spacer -->
            <div class="flex-1"></div>

            <!-- Pular -->
            <button
              @click="pularExercicio()"
              class="text-xs text-slate-600 hover:text-slate-400 transition-colors"
            >
              Pular
            </button>
          </div>
        </div>
      </template>

      <!-- ── Fase 3: Conclusão ──────────────────────────────────── -->
      <template x-if="exFase === 'concluido'">
        <div class="p-8 text-center space-y-6">
          <div class="text-5xl" x-text="solucaoVisivel ? '📖' : '🎉'"></div>

          <div>
            <h4 class="text-xl font-bold text-slate-100 mb-1"
              x-text="solucaoVisivel ? 'Exercício concluído com ajuda' : 'Parabéns!'"></h4>
            <p class="text-slate-400 text-sm"
              x-text="solucaoVisivel ? 'Revise a solução e tente novamente depois.' : 'Você resolveu o exercício!'"></p>
          </div>

          <!-- XP ganho -->
          <template x-if="xpGanho > 0">
            <div class="inline-flex items-center gap-2 bg-yellow-500/15 border border-yellow-500/30 text-yellow-400 font-bold text-lg px-6 py-3 rounded-full">
              <span>+</span>
              <span x-text="xpGanho"></span>
              <span class="text-sm font-normal text-yellow-300">XP</span>
            </div>
          </template>

          <!-- Novas badges -->
          <template x-if="novasBadges.length > 0">
            <div class="space-y-2">
              <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Badge conquistada!</p>
              <template x-for="b in novasBadges" :key="b">
                <div class="inline-flex items-center gap-2 bg-python-500/15 border border-python-500/30 text-python-400 text-sm px-4 py-2 rounded-full">
                  <span x-text="b"></span>
                </div>
              </template>
            </div>
          </template>

          <!-- Solução (concluído com ajuda) -->
          <template x-if="solucaoVisivel && exAtual?.solucao">
            <div class="text-left rounded-xl border border-slate-700 bg-slate-800 p-4 mt-4">
              <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Solução</p>
              <pre class="text-sm text-slate-300 font-mono whitespace-pre-wrap" x-text="exAtual.solucao"></pre>
            </div>
          </template>

          <button
            @click="fecharModal()"
            class="bg-python-500 hover:bg-python-400 text-slate-950 font-semibold px-8 py-2.5 rounded-lg transition-colors"
          >
            Fechar
          </button>
        </div>
      </template>

    </div>
  </div>

  <!-- ================================================================
       Drawer TOC para mobile
       ================================================================ -->
  <div
    x-show="tocAberto"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    @click.self="tocAberto = false"
    class="fixed inset-0 z-30 bg-black/60 lg:hidden"
  >
    <div
      x-show="tocAberto"
      x-transition:enter="transition ease-out duration-250"
      x-transition:enter-start="-translate-x-full"
      x-transition:enter-end="translate-x-0"
      class="absolute left-0 top-0 bottom-0 w-72 bg-slate-900 border-r border-slate-800 p-5 overflow-y-auto"
    >
      <div class="flex items-center justify-between mb-4">
        <p class="text-sm font-semibold text-slate-300">Índice do módulo</p>
        <button @click="tocAberto = false" class="text-slate-500 hover:text-slate-300 p-1">✕</button>
      </div>
      <nav class="space-y-1">
        <template x-for="item in toc" :key="item.ancora">
          <a
            :href="'#' + item.ancora"
            :class="item.nivel === 3 ? 'pl-4 text-xs' : 'text-sm'"
            class="block text-slate-400 hover:text-python-400 transition-colors py-1.5 leading-snug"
            x-text="item.texto"
            @click="tocAberto = false"
          ></a>
        </template>
      </nav>
    </div>
  </div>

</body>
</html>
